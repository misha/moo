name: moo
description: A dystopian file-sorting game.
publish_to: none
version: 1.0.0+1
environment:
  sdk: ^3.11.1
dependencies:
  flutter:
    sdk: flutter
  animated_flip_counter: ^0.3.4
  collection: ^1.19.1
  cupertino_icons: ^1.0.8
  email_validator: ^3.0.0
  flame: ^1.36.0
  flame_audio: ^2.12.0
  flame_fuse: ^2.0.1
  flutter_hooks: ^0.21.3+1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  hooks_riverpod: ^3.2.1
  logger: ^2.6.2
  marquee: ^2.3.0
  meta: ^1.17.0
  package_info_plus: ^9.0.0
  riverpod_annotation: ^4.0.2
  shared_preferences: ^2.5.4
  typewritertext: ^3.0.9
  yafsm: ^1.1.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.11.1
  flutter_gen_runner: ^5.12.0
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  riverpod_generator: ^4.0.3
  riverpod_lint: ^3.1.3
  widgetbook: ^3.20.2
  widgetbook_annotation: ^3.9.0
  widgetbook_generator: ^3.20.1
flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/music/
    - assets/sounds/
  fonts:
    - family: VT323
      fonts:
        - asset: fonts/VT323/VT323-Regular.ttf
    - family: ShareTechMono
      fonts:
        - asset: fonts/ShareTechMono/ShareTechMono-Regular.ttf
flutter_launcher_icons:
  image_path: "icon/icon.png"
  android: "launcher_icon"
  adaptive_icon_background: "#1A4A1A"
  adaptive_icon_foreground: "icon/icon_foreground.png"
  ios: true
  min_sdk_android: 21
  web:
    generate: true
    image_path: "icon/icon_foreground.png"
    background_color: "#1A4A1A"
    theme_color: "#00FF41"
scripts:
  build: dart run build_runner build --delete-conflicting-outputs
  watch: dart run build_runner watch --delete-conflicting-outputs
  test: flutter test
  icon: dart run flutter_launcher_icons
